# =============================================
# LOCAL DEVELOPMENT PROFILE
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# =============================================

server.port=8080

# Local PostgreSQL — change to match your local setup
spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=postgres
spring.datasource.password=postgres

# Auto-create tables locally — safe for development only
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable AWS Parameter Store locally
spring.config.import=

logging.level.com.example.app=DEBUG
logging.level.org.hibernate.SQL=DEBUG
