# =============================================
# APPLICATION
# =============================================
spring.application.name=springboot-aws
# Port 5000 is required by AWS Elastic Beanstalk
server.port=${SERVER_PORT:8080}

# =============================================
# DATABASE — values injected by AWS at runtime
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' in production — never 'create' or 'update'
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# AWS PARAMETER STORE
# Pull secrets from /springboot-aws/prod/ prefix
# =============================================
spring.config.import=optional:aws-parameterstore:/springboot-aws/prod/

# =============================================
# ACTUATOR (health checks)
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# =============================================
# LOGGING
# =============================================
logging.level.com.example.app=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
